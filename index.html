<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicMC - Minecraft Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-primary text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-secondary/80 backdrop-blur-lg border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-accent to-emerald-400 bg-clip-text text-transparent" data-translate="title"></h1>
                </div>

                <!-- Mobile menu button -->
                <div class="flex md:hidden">
                    <button id="mobileMenuButton" type="button" class="text-gray-300 hover:text-white">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center justify-between flex-1 ml-12">
                    <div class="flex gap-8">
                        <a href="#" class="text-white relative group">
                            <span class="text-sm font-medium" data-translate="home"></span>
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span>
                        </a>
                        <a href="#" class="text-gray-300 hover:text-white relative group">
                            <span class="text-sm font-medium" data-translate="download"></span>
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span>
                        </a>
                        <a href="#" class="text-gray-300 hover:text-white relative group">
                            <span class="text-sm font-medium" data-translate="about"></span>
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span>
                        </a>
                    </div>

                    <!-- Language Selector -->
                    <div class="relative group">
                        <button id="languageButton" class="flex items-center gap-2 bg-secondary/50 hover:bg-secondary/80 text-gray-300 px-4 py-2 rounded-lg transition-all">
                            <i class="fas fa-globe text-accent"></i>
                            <span id="currentLanguage">🇪🇸 Español</span>
                            <i class="fas fa-chevron-down text-gray-400 group-hover:rotate-180 transition-transform"></i>
                        </button>
                        <div id="languageDropdown" class="hidden absolute right-0 mt-2 w-full bg-secondary border border-gray-700 rounded-lg shadow-xl">
                            <div class="py-1">
                                <button value="es" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇪🇸 Español
                                </button>
                                <button value="en" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇺🇸 English
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mobile Navigation Menu -->
            <div id="mobileMenu" class="hidden md:hidden py-4">
                <div class="flex flex-col gap-4">
                    <a href="#" class="text-white block px-3 py-2 rounded-md text-base font-medium hover:bg-accent/10">
                        <span data-translate="home"></span>
                    </a>
                    <a href="#" class="text-gray-300 block px-3 py-2 rounded-md text-base font-medium hover:bg-accent/10 hover:text-white">
                        <span data-translate="download"></span>
                    </a>
                    <a href="#" class="text-gray-300 block px-3 py-2 rounded-md text-base font-medium hover:bg-accent/10 hover:text-white">
                        <span data-translate="about"></span>
                    </a>
                    <!-- Mobile Language Selector -->
                    <div class="px-3">
                        <button id="mobileLangButton" class="w-full flex items-center justify-between gap-2 bg-secondary/50 hover:bg-secondary/80 text-gray-300 px-4 py-2 rounded-lg transition-all">
                            <span class="flex items-center gap-2">
                                <i class="fas fa-globe text-accent"></i>
                                <span id="mobileCurrentLanguage">🇪🇸 Español</span>
                            </span>
                            <i class="fas fa-chevron-down text-gray-400"></i>
                        </button>
                        <div id="mobileLangDropdown" class="hidden mt-2 w-full bg-secondary border border-gray-700 rounded-lg shadow-xl">
                            <div class="py-1">
                                <button value="es" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇪🇸 Español
                                </button>
                                <button value="en" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇺🇸 English
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <!-- Left Column -->
            <div class="text-center md:text-left">
                <h2 class="text-4xl font-bold mb-6">
                    <span class="block" data-translate="title"></span>
                    <span class="block text-accent" data-translate="subtitle"></span>
                </h2>
                <p class="text-gray-300 mb-8" data-translate="description"></p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                    <a href="#" class="bg-accent hover:bg-emerald-700 text-white px-6 py-3 rounded-lg flex items-center justify-center">
                        <i class="fas fa-download mr-2"></i>
                        <span data-translate="downloadNow"></span>
                    </a>
                    <a href="#" class="border border-accent text-accent hover:bg-accent hover:text-white px-6 py-3 rounded-lg flex items-center justify-center">
                        <i class="fab fa-github mr-2"></i>
                        <span data-translate="github"></span>
                    </a>
                </div>
            </div>
            
            <!-- Right Column - Features -->    
            <div class="bg-secondary rounded-xl p-6 space-y-6">
                <div class="flex items-start space-x-4">
                    <div class="bg-accent p-3 rounded-lg">
                        <i class="fas fa-code text-white"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg" data-translate="openSource"></h3>
                        <p class="text-gray-300" data-translate="openSourceDesc"></p>
                    </div>
                </div>

                <div class="flex items-start space-x-4">
                    <div class="bg-accent p-3 rounded-lg">
                        <i class="fas fa-bolt text-white"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg" data-translate="performance"></h3>
                        <p class="text-gray-300" data-translate="performanceDesc"></p>
                    </div>
                </div>

                <div class="flex items-start space-x-4">
                    <div class="bg-accent p-3 rounded-lg">
                        <i class="fas fa-paint-brush text-white"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg" data-translate="customization"></h3>
                        <p class="text-gray-300" data-translate="customizationDesc"></p>
                    </div>
                </div>

                <div class="flex items-start space-x-4">
                    <div class="bg-accent p-3 rounded-lg">
                        <i class="fas fa-shield-alt text-white"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg" data-translate="noDrm"></h3>
                        <p class="text-gray-300" data-translate="noDrmDesc"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Screenshots & Comparisons Section -->
    <div class="max-w-7xl mx-auto px-4 py-16 border-t border-gray-700">
        <!-- Section Header -->
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold mb-4">
                <span data-translate="screenshotsTitle">Capturas de Pantalla</span>
            </h2>
            <p class="text-gray-300 max-w-2xl mx-auto" data-translate="screenshotsDesc">
                Descubre la interfaz moderna y las características únicas de CubicMC
            </p>
        </div>

        <!-- Screenshots Carousel -->
        <div class="relative mb-20">
            <div id="screenshotsCarousel" class="overflow-hidden rounded-xl">
                <div class="flex transition-transform duration-500 ease-in-out">
                    <!-- Slides container -->
                    <div class="min-w-full flex-shrink-0">
                        <img src="https://wallpaperaccess.com/full/1641769.jpg" alt="CubicMC Interface" class="w-full h-[500px] object-cover rounded-xl">
                    </div>
                    <div class="min-w-full flex-shrink-0">
                        <img src="https://wallpaperboat.com/wp-content/uploads/2021/09/20/78678/waifu-11.jpg" alt="CubicMC Mods" class="w-full h-[500px] object-cover rounded-xl">
                    </div>
                    <div class="min-w-full flex-shrink-0">
                        <img src="https://wallpapercave.com/wp/wp2417186.png" alt="CubicMC Settings" class="w-full h-[500px] object-cover rounded-xl">
                    </div>
                </div>
            </div>
            <!-- Carousel Controls -->
            <button id="prevSlide" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/75 text-white p-3 rounded-full transition-colors">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button id="nextSlide" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/75 text-white p-3 rounded-full transition-colors">
                <i class="fas fa-chevron-right"></i>
            </button>
            <!-- Carousel Indicators -->
            <div class="flex justify-center mt-4 gap-2">
                <button class="w-3 h-3 rounded-full bg-accent transition-colors"></button>
                <button class="w-3 h-3 rounded-full bg-gray-600 transition-colors"></button>
                <button class="w-3 h-3 rounded-full bg-gray-600 transition-colors"></button>
            </div>
        </div>

        <!-- Comparisons Section -->
        <div class="mt-20">
            <h3 class="text-2xl font-bold text-center mb-8" data-translate="comparisonsTitle"></h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Feature Labels -->
                <div class="space-y-6">
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="font-bold text-lg" data-translate="feature"></span>
                    </div>
                    <div class="p-4 bg-secondary/30 rounded-lg h-16 flex items-center">
                        <span class="font-medium" data-translate="performanceFeature"></span>
                    </div>
                    <div class="p-4 bg-secondary/30 rounded-lg h-16 flex items-center">
                        <span class="font-medium" data-translate="customThemes"></span>
                    </div>
                    <div class="p-4 bg-secondary/30 rounded-lg h-16 flex items-center">
                        <span class="font-medium" data-translate="modSupport"></span>
                    </div>
                    <div class="p-4 bg-secondary/30 rounded-lg h-16 flex items-center">
                        <span class="font-medium" data-translate="openSource"></span>
                    </div>
                    <div class="p-4 bg-secondary/30 rounded-lg h-16 flex items-center">
                        <span class="font-medium" data-translate="offlineMode"></span>
                    </div>
                    <div class="p-4 bg-secondary/30 rounded-lg h-16 flex items-center">
                        <span class="font-medium" data-translate="safeLauncher"></span>
                    </div>
                </div>

                <!-- CubicMC -->
                <div class="space-y-6">
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="font-bold text-lg text-accent">CubicMC</span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                </div>

                <!-- Launcher A -->
                <div class="space-y-6">
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="font-bold text-lg">TLauncher</span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                </div>

                <!-- Launcher B -->
                <div class="space-y-6">
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="font-bold text-lg">Battly</span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-accent text-xl"><i class="fas fa-check"></i></span>
                    </div>
                    <div class="p-4 bg-secondary rounded-lg h-16 flex items-center justify-center">
                        <span class="text-gray-500 text-xl"><i class="fas fa-times"></i></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-secondary mt-12 border-t border-gray-700">
        <div class="max-w-7xl mx-auto py-10 px-6">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-6 md:space-y-0">
                <div class="flex space-x-8">
                    <a href="#" class="text-gray-400 hover:text-accent transition-all duration-300 hover:-translate-y-1">
                        <i class="fab fa-discord text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-accent transition-all duration-300 hover:-translate-y-1">
                        <i class="fab fa-github text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-accent transition-all duration-300 hover:-translate-y-1">
                        <i class="fas fa-headset text-2xl"></i>
                    </a>
                </div>
                <p class="text-gray-400 text-sm font-light tracking-wide">
                    <span data-translate="rights"></span>
                </p>
            </div>
        </div>
    </footer>
    <script src="./src/config/tailwind.config.js"></script>
    <script src="./src/langs/translations.js"></script>
    <script src="./src/langs/language.js"></script>
    <script src="./src/scripts/langButton.js"></script>
    <script src="./src/scripts/mobileMenu.js"></script>
    <script src="./src/scripts/carousel.js"></script>
</body>
</html>
