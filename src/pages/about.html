<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicMC - About</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-primary text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-secondary/80 backdrop-blur-lg border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-accent to-emerald-400 bg-clip-text text-transparent" data-translate="title"></h1>
                </div>

                <!-- Mobile menu button -->
                <div class="flex md:hidden">
                    <button id="mobileMenuButton" type="button" class="text-gray-300 hover:text-white">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center justify-between flex-1 ml-12">
                    <div class="flex gap-8">
                        <a href="/" class="text-white relative group">
                            <span class="text-sm font-medium" data-translate="home"></span>
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span>
                        </a>
                        <a href="#" class="text-gray-300 hover:text-white relative group">
                            <span class="text-sm font-medium" data-translate="download"></span>
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span>
                        </a>
                        <a href="/src/pages/about.html" class="text-gray-300 hover:text-white relative group">
                            <span class="text-sm font-medium" data-translate="about"></span>
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span>
                        </a>
                    </div>

                    <!-- Language Selector -->
                    <div class="relative group">
                        <button id="languageButton" class="flex items-center gap-2 bg-secondary/50 hover:bg-secondary/80 text-gray-300 px-4 py-2 rounded-lg transition-all">
                            <i class="fas fa-globe text-accent"></i>
                            <span id="currentLanguage">🇪🇸 Español</span>
                            <i class="fas fa-chevron-down text-gray-400 group-hover:rotate-180 transition-transform"></i>
                        </button>
                        <div id="languageDropdown" class="hidden absolute right-0 mt-2 w-full bg-secondary border border-gray-700 rounded-lg shadow-xl">
                            <div class="py-1">
                                <button value="es" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇪🇸 Español
                                </button>
                                <button value="en" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇺🇸 English
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mobile Navigation Menu -->
            <div id="mobileMenu" class="hidden md:hidden py-4">
                <div class="flex flex-col gap-4">
                    <a href="#" class="text-white block px-3 py-2 rounded-md text-base font-medium hover:bg-accent/10">
                        <span data-translate="home"></span>
                    </a>
                    <a href="#" class="text-gray-300 block px-3 py-2 rounded-md text-base font-medium hover:bg-accent/10 hover:text-white">
                        <span data-translate="download"></span>
                    </a>
                    <a href="#" class="text-gray-300 block px-3 py-2 rounded-md text-base font-medium hover:bg-accent/10 hover:text-white">
                        <span data-translate="about"></span>
                    </a>
                    <!-- Mobile Language Selector -->
                    <div class="px-3">
                        <button id="mobileLangButton" class="w-full flex items-center justify-between gap-2 bg-secondary/50 hover:bg-secondary/80 text-gray-300 px-4 py-2 rounded-lg transition-all">
                            <span class="flex items-center gap-2">
                                <i class="fas fa-globe text-accent"></i>
                                <span id="mobileCurrentLanguage">🇪🇸 Español</span>
                            </span>
                            <i class="fas fa-chevron-down text-gray-400"></i>
                        </button>
                        <div id="mobileLangDropdown" class="hidden mt-2 w-full bg-secondary border border-gray-700 rounded-lg shadow-xl">
                            <div class="py-1">
                                <button value="es" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇪🇸 Español
                                </button>
                                <button value="en" class="w-full text-left px-4 py-2 text-gray-300 hover:bg-accent/10 hover:text-white">
                                    🇺🇸 English
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Nuevo contenido About -->
    <div class="max-w-4xl mx-auto px-4 py-16">
        <!-- About Section -->
        <div class="mb-20">
            <h1 class="text-3xl font-bold mb-8 text-center" data-translate="aboutTitle"></h1>
            <p class="text-gray-300 text-lg leading-relaxed text-center mb-12" data-translate="aboutDescription"></p>
        </div>

        <!-- Maintainers Section -->
        <div class="mb-20">
            <h2 class="text-2xl font-bold mb-8" data-translate="maintainers"></h2>
            <div class="space-y-6">
                <!-- Maintainer 1 -->
                <div class="flex items-center space-x-4 bg-secondary/30 p-4 rounded-lg">
                    <img src="https://avatars.githubusercontent.com/u/149891004?v=4" alt="Avatar" class="w-16 h-16 rounded-full">
                    <div>
                        <h3 class="font-semibold text-lg">santiagolxx</h3>
                        <p class="text-gray-400" data-translate="backendDev"></p>
                        <p class="text-sm text-gray-300 mt-1" data-translate="backendDesc"></p>
                    </div>
                </div> 

                <!-- Maintainer 2 -->

                <div class="flex items-center space-x-4 bg-secondary/30 p-4 rounded-lg">
                    <img src="https://avatars.githubusercontent.com/u/108166164?v=4" alt="Avatar" class="w-16 h-16 rounded-full">
                    <div>
                        <h3 class="font-semibold text-lg">staFF6773 </h3>
                        <p class="text-gray-400" data-translate="frontendDev"></p>
                        <p class="text-sm text-gray-300 mt-1" data-translate="frontendDesc"></p>
                    </div>
                </div>

                <!-- Maintainer 3 -->
                <div class="flex items-center space-x-4 bg-secondary/30 p-4 rounded-lg">
                    <img src="https://github.com/identicon.png" alt="Avatar" class="w-16 h-16 rounded-full">
                    <div>
                        <h3 class="font-semibold text-lg">???</h3>
                        <p class="text-gray-400" data-translate="systemsArch"></p>
                        <p class="text-sm text-gray-300 mt-1" data-translate="systemsDesc"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contributors Section -->
        <div class="mb-20">
            <h2 class="text-2xl font-bold mb-6" data-translate="contributors"></h2>
            <div class="flex flex-wrap gap-3">
                <a href="https://github.com/LainLife" class="flex items-center space-x-2 bg-secondary/30 px-4 py-2 rounded-lg hover:bg-secondary/50 transition-colors">
                    <img src="https://avatars.githubusercontent.com/u/206507056?v=4" alt="Contributor" class="w-6 h-6 rounded-full">
                    <span class="text-gray-300">LainLife </span>
                </a>
            </div>
        </div>

        <!-- Project Links -->
        <div class="space-y-4">
            <h2 class="text-2xl font-bold mb-6" data-translate="projectLinks"></h2>
            <div class="flex flex-col space-y-3">
                <a href="https://github.com/CubicLauncher/launcher" class="flex items-center space-x-3 text-gray-300 hover:text-accent transition-colors">
                    <i class="fab fa-github"></i>
                    <span data-translate="sourceCode"></span>
                </a>
                <a href="https://github.com/CubicLauncher/launcher/issues" class="flex items-center space-x-3 text-gray-300 hover:text-accent transition-colors">
                    <i class="fas fa-bug"></i>
                    <span data-translate="githubIssues"></span>
                </a>
                <a href="#" class="flex items-center space-x-3 text-gray-300 hover:text-accent transition-colors">
                    <i class="fab fa-discord"></i>
                    <span data-translate="discordCommunity"></span>
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-secondary mt-12 border-t border-gray-700">
        <div class="max-w-7xl mx-auto py-10 px-6">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-6 md:space-y-0">
                <div class="flex space-x-8">
                    <a href="#" class="text-gray-400 hover:text-accent transition-all duration-300 hover:-translate-y-1">
                        <i class="fab fa-discord text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-accent transition-all duration-300 hover:-translate-y-1">
                        <i class="fab fa-github text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-accent transition-all duration-300 hover:-translate-y-1">
                        <i class="fas fa-headset text-2xl"></i>
                    </a>
                </div>
                <p class="text-gray-400 text-sm font-light tracking-wide">
                    <span data-translate="rights"></span>
                </p>
            </div>
        </div>
    </footer>
    <script src="../config/tailwind.config.js"></script>
    <script src="../langs/language.js"></script>
    <script src="../langs/translations.js"></script>
    <script src="../scripts/langButton.js"></script>
    <script src="../scripts/mobileMenu.js"></script>
</body>
</html>
